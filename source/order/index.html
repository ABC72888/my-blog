<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单服务 - 海外实体卡激活教程</title>
  <style>
    :root {
      color-scheme: light;
      --text: #172033;
      --muted: #647084;
      --line: #d9dee8;
      --panel: #ffffff;
      --primary: #1677d2;
      --primary-dark: #0d5fa8;
      --accent: #f06a00;
      --accent-dark: #d95f00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef5fb 0%, #f7f9fc 46%, #ffffff 100%);
    }

    header {
      border-bottom: 1px solid rgba(23, 32, 51, .08);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
    }

    .nav, main {
      width: min(820px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .home {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }

    main {
      padding: 48px 0 70px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(23, 32, 51, .1);
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(40, 61, 94, .08);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 38px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 26px;
    }

    .action {
      display: flex;
      min-height: 120px;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      color: var(--text);
      background: #fff;
      text-decoration: none;
    }

    .action strong {
      font-size: 21px;
      letter-spacing: 0;
    }

    .action span {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .query {
      border-color: rgba(22, 119, 210, .24);
      box-shadow: inset 4px 0 0 var(--primary);
    }

    .address {
      border-color: rgba(240, 106, 0, .24);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .query:hover {
      border-color: var(--primary);
      background: #f4f9ff;
    }

    .address:hover {
      border-color: var(--accent);
      background: #fff8f1;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-height: 40px;
      margin-top: 6px;
      border-radius: 6px;
      padding: 0 16px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .query .button { background: var(--primary); }
    .address .button { background: var(--accent); }
    .query:hover .button { background: var(--primary-dark); }
    .address:hover .button { background: var(--accent-dark); }

    @media (max-width: 660px) {
      main { padding-top: 30px; }
      .panel { padding: 22px; }
      .actions { grid-template-columns: 1fr; }
      .action { min-height: 112px; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="/">海外实体卡激活教程</a>
      <a class="home" href="/">返回首页</a>
    </nav>
  </header>

  <main>
    <section class="panel">
      <h1>订单服务</h1>
      <p>选择你要办理的功能。</p>

      <div class="actions">
        <a class="action query" href="/query/">
          <strong>快递单号查询</strong>
          <span>输入链动订单号，查询对应快递单号和申通物流入口。</span>
          <span class="button">立即查询</span>
        </a>

        <a class="action address" href="/address/">
          <strong>订单地址登记</strong>
          <span>提交链动订单号、收件人、手机号和收货地址。</span>
          <span class="button">去登记</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
