<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快件查询 - 海外实体卡激活教程</title>
  <style>
    :root {
      color-scheme: light;
      --text: #172033;
      --muted: #747b87;
      --line: #e5e7eb;
      --panel: #ffffff;
      --page: #f5f6f8;
      --orange: #f06a00;
      --orange-dark: #d95f00;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--page);
    }

    header {
      height: 62px;
      background: #20242a;
    }

    main {
      width: min(980px, calc(100% - 28px));
      margin: -20px auto 56px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(20, 28, 42, .08);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 76px;
      padding: 0 26px;
      border-bottom: 20px solid var(--page);
      font-size: 18px;
      font-weight: 650;
    }

    .title::before {
      content: "";
      width: 5px;
      height: 19px;
      background: var(--orange);
    }

    .search {
      padding: 34px 26px 18px;
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 22px;
      padding: 0 18px;
      color: #fff;
      background: #73777d;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, .82);
      font-weight: 500;
    }

    button, .track-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      border: 0;
      border-radius: 2px;
      padding: 0 26px;
      color: #fff;
      background: var(--orange);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover, .track-link:hover { background: var(--orange-dark); }
    button:disabled { opacity: .65; cursor: not-allowed; }

    .recent {
      margin-top: 12px;
      color: #9aa0aa;
      font-size: 14px;
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 24px 26px 28px;
      background: var(--panel);
      border-top: 1px solid var(--line);
    }

    .result.show { display: block; }

    .waybill {
      margin: 0;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 24px;
      padding-top: 24px;
    }

    .places {
      display: grid;
      gap: 24px;
      color: var(--muted);
      line-height: 1.45;
    }

    .places strong {
      display: block;
      color: var(--text);
      font-size: 17px;
      margin-top: 2px;
    }

    .notice {
      padding: 18px;
      border-left: 3px solid var(--orange);
      background: #fff7ed;
      color: #394150;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .copy {
      height: 42px;
      background: #1f2937;
    }

    .copy:hover { background: #111827; }

    .error {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 6px;
      color: var(--bad);
      background: #fff6f5;
      border: 1px solid rgba(180, 35, 24, .16);
      line-height: 1.7;
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 20px, 980px);
        margin-top: -12px;
      }

      .title, .search, .result {
        padding-left: 18px;
        padding-right: 18px;
      }

      form {
        grid-template-columns: 1fr;
      }

      button, .track-link {
        width: 100%;
      }

      .summary {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .places {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="title">快件查询</div>

    <section class="search">
      <form id="queryForm">
        <input id="orderNo" name="orderNo" autocomplete="off" placeholder="例如 LD260724OCOUVM" maxlength="14" pattern="LD[A-Za-z0-9]{12}" required>
        <button id="submitBtn" type="submit">点击查询</button>
      </form>
      <div class="recent">最近查询记录：</div>
    </section>

    <section id="result" class="result" aria-live="polite"></section>
  </main>

  <script>
    const form = document.querySelector('#queryForm');
    const input = document.querySelector('#orderNo');
    const button = document.querySelector('#submitBtn');
    const result = document.querySelector('#result');
    let latestTrackingNo = '';

    function carrierName(code) {
      const names = {
        sto: '申通快递',
        shentong: '申通快递'
      };
      return names[String(code || '').toLowerCase()] || code || '快递';
    }

    function stoTrackUrl(trackingNo) {
      const nu = encodeURIComponent(String(trackingNo || '').replace(/\s+/g, ''));
      return `https://www.sto.cn/pc/service-page/iframe_2_21_${nu}`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatWaybill(value) {
      return String(value || '').replace(/\s+/g, '').replace(/(.{4})/g, '$1 ').trim();
    }

    function showResult(html) {
      result.className = 'result show';
      result.innerHTML = html;
    }

    function showError(message) {
      result.className = 'result show';
      result.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const orderNo = input.value.trim().replace(/\s+/g, '').toUpperCase();
      latestTrackingNo = '';

      if (!orderNo) {
        showError('请输入订单号。');
        return;
      }

      if (!/^LD[A-Z0-9]{12}$/.test(orderNo)) {
        showError('订单号格式不正确，必须是 LD 开头的 14 位订单号，例如 LD260724OCOUVM。');
        return;
      }

      button.disabled = true;
      button.textContent = '查询中';
      showResult('<div class="notice">正在查询，请稍候...</div>');

      try {
        const response = await fetch(`/api/order?orderNo=${encodeURIComponent(orderNo)}`, {
          headers: { accept: 'application/json' }
        });
        const payload = await response.json();

        if (!payload.ok) {
          showError(payload.message || '没有查到这个订单号。');
          return;
        }

        const data = payload.data;
        latestTrackingNo = data.trackingNo;

        if (data.status === 'pending' || !data.trackingNo) {
          showResult(`
            <h1 class="waybill">订单号: ${escapeHtml(data.orderNo)}</h1>
            <div class="summary">
              <div class="places">
                <div>订单状态<strong>待发货</strong></div>
              </div>
              <div>
                <div class="notice">你的收货地址已经提交成功，请等待发货。发货后再来查询，就能看到快递单号。</div>
              </div>
            </div>
          `);
          return;
        }

        const trackUrl = stoTrackUrl(data.trackingNo);

        showResult(`
          <h1 class="waybill">运单号: ${escapeHtml(formatWaybill(data.trackingNo))}</h1>
          <div class="summary">
            <div class="places">
              <div>快递公司<strong>${escapeHtml(carrierName(data.carrier))}</strong></div>
              <div>订单号<strong>${escapeHtml(data.orderNo)}</strong></div>
            </div>
            <div>
              <div class="notice">已查到对应快递单号。点击下方按钮可打开申通官网查看实时物流轨迹，快递单号会自动带过去。</div>
              <div class="actions">
                <button class="copy" type="button" onclick="copyTrackingNo()">复制快递单号</button>
                <a class="track-link" href="${trackUrl}" target="_blank" rel="noopener noreferrer">查看物流轨迹</a>
              </div>
            </div>
          </div>
        `);
      } catch (error) {
        showError('查询失败，请稍后再试。');
      } finally {
        button.disabled = false;
        button.textContent = '点击查询';
      }
    });

    async function copyTrackingNo() {
      if (!latestTrackingNo) return;
      await navigator.clipboard.writeText(latestTrackingNo);
      const copyButton = document.querySelector('.copy');
      if (copyButton) {
        copyButton.textContent = '已复制';
        setTimeout(() => { copyButton.textContent = '复制快递单号'; }, 1200);
      }
    }
  </script>
</body>
</html>
