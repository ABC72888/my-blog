<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快件查询 - 海外实体卡激活教程</title>
  <style>
    :root {
      color-scheme: light;
      --text: #172033;
      --muted: #747b87;
      --line: #e5e7eb;
      --panel: #ffffff;
      --page: #f5f6f8;
      --orange: #f06a00;
      --orange-dark: #d95f00;
      --green: #1fb955;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--page);
    }

    header {
      height: 62px;
      background: #20242a;
    }

    main {
      width: min(980px, calc(100% - 28px));
      margin: -20px auto 56px;
    }

    .panel {
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(20, 28, 42, .08);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 76px;
      padding: 0 26px;
      border-bottom: 20px solid var(--page);
      font-size: 18px;
      font-weight: 650;
    }

    .title::before {
      content: "";
      width: 5px;
      height: 19px;
      background: var(--orange);
    }

    .search {
      padding: 34px 26px 18px;
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 22px;
      padding: 0 18px;
      color: #fff;
      background: #73777d;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, .82);
      font-weight: 500;
    }

    button {
      height: 42px;
      border: 0;
      border-radius: 2px;
      padding: 0 26px;
      color: #fff;
      background: var(--orange);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--orange-dark); }
    button:disabled { opacity: .65; cursor: not-allowed; }

    .recent {
      margin-top: 12px;
      color: #9aa0aa;
      font-size: 14px;
    }

    .result {
      display: none;
      margin-top: 18px;
      padding: 24px 26px 28px;
      background: var(--panel);
      border-top: 1px solid var(--line);
    }

    .result.show { display: block; }

    .waybill {
      margin: 0;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 24px;
      padding-top: 24px;
    }

    .places {
      display: grid;
      gap: 24px;
      color: var(--muted);
      line-height: 1.45;
    }

    .places strong {
      display: block;
      color: var(--text);
      font-size: 17px;
      margin-top: 2px;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 18px;
      padding-left: 30px;
      border-left: 2px solid #d8dde5;
    }

    .trace {
      position: relative;
    }

    .trace::before {
      content: "";
      position: absolute;
      left: -37px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #c7ccd4;
      border: 4px solid #fff;
      box-shadow: 0 0 0 1px #c7ccd4;
    }

    .trace:first-child::before {
      background: var(--green);
      box-shadow: 0 0 0 1px var(--green);
    }

    .badge {
      display: inline-block;
      margin-right: 8px;
      padding: 3px 6px;
      border-radius: 3px;
      color: #fff;
      background: var(--green);
      font-size: 12px;
      font-weight: 800;
      vertical-align: 2px;
    }

    .trace-text {
      color: #1f2937;
      font-size: 15px;
      font-weight: 650;
      line-height: 1.8;
    }

    .trace-time {
      margin-top: 4px;
      color: #5f6876;
      font-size: 13px;
      font-weight: 650;
    }

    .empty, .error {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 6px;
      line-height: 1.7;
    }

    .empty {
      color: #606978;
      background: #f3f5f8;
    }

    .error {
      color: var(--bad);
      background: #fff6f5;
      border: 1px solid rgba(180, 35, 24, .16);
    }

    .copy {
      margin-top: 18px;
      height: 38px;
      padding: 0 18px;
      background: #1f2937;
    }

    .copy:hover { background: #111827; }

    @media (max-width: 680px) {
      main {
        width: min(100% - 20px, 980px);
        margin-top: -12px;
      }

      .title, .search, .result {
        padding-left: 18px;
        padding-right: 18px;
      }

      form {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .summary {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .places {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <header></header>
  <main class="panel">
    <div class="title">快件查询</div>

    <section class="search">
      <form id="queryForm">
        <input id="orderNo" name="orderNo" autocomplete="off" placeholder="请输入订单号" required>
        <button id="submitBtn" type="submit">点击查询</button>
      </form>
      <div class="recent">最近查询记录：</div>
    </section>

    <section id="result" class="result" aria-live="polite"></section>
  </main>

  <script>
    const form = document.querySelector('#queryForm');
    const input = document.querySelector('#orderNo');
    const button = document.querySelector('#submitBtn');
    const result = document.querySelector('#result');
    let latestTrackingNo = '';

    function carrierName(code) {
      const names = {
        sto: '申通快递',
        shentong: '申通快递'
      };
      return names[String(code || '').toLowerCase()] || code || '快递';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatWaybill(value) {
      return String(value || '').replace(/\s+/g, '').replace(/(.{4})/g, '$1 ').trim();
    }

    function renderTrace(track) {
      if (!track || !track.available) {
        return `<div class="empty">${escapeHtml(track?.message || '暂时没有查到物流轨迹。')}</div>`;
      }

      if (!track.traces || !track.traces.length) {
        return '<div class="empty">快递鸟暂时没有返回详细轨迹，请稍后再查。</div>';
      }

      return `
        <div class="timeline">
          ${track.traces.map((item, index) => `
            <div class="trace">
              <div class="trace-text">${index === 0 ? '<span class="badge">新</span>' : ''}${escapeHtml(item.text)}</div>
              <div class="trace-time">${escapeHtml(item.time)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function showResult(html) {
      result.className = 'result show';
      result.innerHTML = html;
    }

    function showError(message) {
      result.className = 'result show';
      result.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const orderNo = input.value.trim();
      latestTrackingNo = '';

      if (!orderNo) {
        showError('请输入订单号。');
        return;
      }

      button.disabled = true;
      button.textContent = '查询中';
      showResult('<div class="empty">正在查询，请稍候...</div>');

      try {
        const response = await fetch(`/api/order?orderNo=${encodeURIComponent(orderNo)}`, {
          headers: { accept: 'application/json' }
        });
        const payload = await response.json();

        if (!payload.ok) {
          showError(payload.message || '没有查到这个订单号。');
          return;
        }

        const data = payload.data;
        latestTrackingNo = data.trackingNo;
        const firstTrace = data.track?.traces?.[0];
        const origin = firstTrace?.location || '-';
        const destination = data.track?.stateText === '已签收' ? '已签收' : '-';

        showResult(`
          <h1 class="waybill">运单号: ${escapeHtml(formatWaybill(data.trackingNo))}</h1>
          <div class="summary">
            <div class="places">
              <div>快递公司<strong>${escapeHtml(carrierName(data.carrier))}</strong></div>
              <div>始发地<strong>${escapeHtml(origin)}</strong></div>
              <div>目的地<strong>${escapeHtml(destination)}</strong></div>
            </div>
            <div>
              ${renderTrace(data.track)}
              <button class="copy" type="button" onclick="copyTrackingNo()">复制快递单号</button>
            </div>
          </div>
        `);
      } catch (error) {
        showError('查询失败，请稍后再试。');
      } finally {
        button.disabled = false;
        button.textContent = '点击查询';
      }
    });

    async function copyTrackingNo() {
      if (!latestTrackingNo) return;
      await navigator.clipboard.writeText(latestTrackingNo);
      const copyButton = document.querySelector('.copy');
      if (copyButton) {
        copyButton.textContent = '已复制';
        setTimeout(() => { copyButton.textContent = '复制快递单号'; }, 1200);
      }
    }
  </script>
</body>
</html>
