<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单管理 - 海外实体卡激活教程</title>
  <style>
    :root {
      color-scheme: light;
      --text: #172033;
      --muted: #647084;
      --line: #d9dee8;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --primary: #1677d2;
      --primary-dark: #0d5fa8;
      --bad: #b42318;
      --ok: #15803d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: #f6f8fb;
    }

    header {
      border-bottom: 1px solid rgba(23, 32, 51, .08);
      background: #fff;
    }

    .nav, main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .links {
      display: flex;
      gap: 14px;
      font-size: 14px;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
    }

    main {
      padding: 28px 0 56px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(23, 32, 51, .1);
      border-radius: 8px;
      padding: 22px;
    }

    h1, h2 {
      margin: 0 0 14px;
      letter-spacing: 0;
    }

    h1 { font-size: 28px; }
    h2 { font-size: 20px; }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 650;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--text);
      background: #fff;
      font: inherit;
      outline: none;
    }

    input, select { height: 42px; }
    textarea { min-height: 78px; padding-top: 10px; resize: vertical; line-height: 1.6; }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 119, 210, .14);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }
    button.secondary { color: var(--text); background: #e9eef6; }
    button.secondary:hover { background: #dfe7f2; }
    button.danger { background: var(--bad); }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 6px;
      background: var(--soft);
      color: var(--text);
    }

    .message.show { display: block; }
    .message.ok { color: var(--ok); }
    .message.bad { color: var(--bad); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 1060px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px 8px;
      text-align: left;
      vertical-align: top;
      word-break: break-all;
    }

    th {
      color: var(--muted);
      font-weight: 650;
      background: #fafbfc;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .toolbar input { max-width: 360px; }
    .muted { color: var(--muted); }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .toolbar input { max-width: none; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="/">海外实体卡激活教程</a>
      <div class="links">
        <a href="/address/">填写地址页</a>
        <a href="/query/">客户查询页</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="panel">
      <h1>订单管理</h1>
      <p>客户提交地址后会出现在下方列表。发货后把快递单号补进去，客户就能用订单号查询。</p>

      <div>
        <label for="adminToken">管理密码</label>
        <input id="adminToken" type="password" autocomplete="current-password" placeholder="输入 Cloudflare 里设置的 ADMIN_TOKEN">
      </div>
      <div class="actions">
        <button type="button" onclick="saveToken()">保存密码</button>
        <button class="secondary" type="button" onclick="clearToken()">清除密码</button>
      </div>
    </section>

    <section class="panel">
      <h2>添加或更新订单</h2>
      <div class="grid">
        <div>
          <label for="orderNo">订单号</label>
          <input id="orderNo" autocomplete="off" placeholder="例如 A202607240001">
        </div>
        <div>
          <label for="trackingNo">快递单号</label>
          <input id="trackingNo" autocomplete="off" placeholder="未发货可先不填">
        </div>
        <div>
          <label for="carrier">快递公司</label>
          <select id="carrier">
            <option value="sto">申通快递</option>
          </select>
        </div>
        <div>
          <label for="recipientName">收件人</label>
          <input id="recipientName" autocomplete="off" placeholder="客户提交后会自动带入">
        </div>
        <div>
          <label for="recipientPhone">手机号</label>
          <input id="recipientPhone" autocomplete="off" placeholder="客户提交后会自动带入">
        </div>
        <div>
          <label for="note">备注</label>
          <input id="note" autocomplete="off" placeholder="可不填">
        </div>
        <div class="full">
          <label for="recipientAddress">收货地址</label>
          <textarea id="recipientAddress" placeholder="客户提交后会自动带入"></textarea>
        </div>
      </div>
      <div class="actions">
        <button type="button" onclick="saveOrder()">保存订单</button>
        <button class="secondary" type="button" onclick="resetForm()">清空</button>
      </div>
      <div id="message" class="message"></div>
    </section>

    <section class="panel">
      <h2>最近订单</h2>
      <div class="toolbar">
        <input id="search" autocomplete="off" placeholder="搜索订单号">
        <button type="button" onclick="loadOrders()">查询</button>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>订单号</th>
              <th>状态</th>
              <th>快递单号</th>
              <th>收件人</th>
              <th>手机号</th>
              <th>收货地址</th>
              <th>备注</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="9">输入管理密码后点击查询。</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const tokenInput = document.querySelector('#adminToken');
    const message = document.querySelector('#message');
    const ordersBody = document.querySelector('#ordersBody');
    let latestOrders = [];

    tokenInput.value = localStorage.getItem('orderAdminToken') || '';

    function token() {
      return tokenInput.value.trim();
    }

    function headers() {
      return {
        'content-type': 'application/json',
        'authorization': `Bearer ${token()}`
      };
    }

    function showMessage(type, text) {
      message.className = `message show ${type}`;
      message.textContent = text;
    }

    function carrierName(code) {
      return String(code || '').toLowerCase() === 'sto' ? '申通快递' : code || '快递';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function saveToken() {
      localStorage.setItem('orderAdminToken', token());
      showMessage('ok', '管理密码已保存在当前浏览器。');
    }

    function clearToken() {
      localStorage.removeItem('orderAdminToken');
      tokenInput.value = '';
      showMessage('ok', '管理密码已清除。');
    }

    function resetForm() {
      document.querySelector('#orderNo').value = '';
      document.querySelector('#trackingNo').value = '';
      document.querySelector('#recipientName').value = '';
      document.querySelector('#recipientPhone').value = '';
      document.querySelector('#recipientAddress').value = '';
      document.querySelector('#note').value = '';
    }

    function fillForm(index) {
      const item = latestOrders[index];
      if (!item) return;

      document.querySelector('#orderNo').value = item.order_no || '';
      document.querySelector('#trackingNo').value = item.tracking_no || '';
      document.querySelector('#carrier').value = item.carrier || 'sto';
      document.querySelector('#recipientName').value = item.recipient_name || '';
      document.querySelector('#recipientPhone').value = item.recipient_phone || '';
      document.querySelector('#recipientAddress').value = item.recipient_address || '';
      document.querySelector('#note').value = item.note || '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveOrder() {
      const body = {
        orderNo: document.querySelector('#orderNo').value.trim(),
        trackingNo: document.querySelector('#trackingNo').value.trim(),
        carrier: document.querySelector('#carrier').value,
        recipientName: document.querySelector('#recipientName').value.trim(),
        recipientPhone: document.querySelector('#recipientPhone').value.trim(),
        recipientAddress: document.querySelector('#recipientAddress').value.trim(),
        note: document.querySelector('#note').value.trim()
      };

      if (!token()) return showMessage('bad', '请先输入管理密码。');
      if (!body.orderNo) return showMessage('bad', '订单号要填写。');

      const response = await fetch('/api/admin/orders', {
        method: 'POST',
        headers: headers(),
        body: JSON.stringify(body)
      });
      const payload = await response.json();

      showMessage(payload.ok ? 'ok' : 'bad', payload.message || (payload.ok ? '保存成功。' : '保存失败。'));
      if (payload.ok) {
        resetForm();
        loadOrders();
      }
    }

    async function loadOrders() {
      if (!token()) {
        ordersBody.innerHTML = '<tr><td colspan="9">请先输入管理密码。</td></tr>';
        return;
      }

      const q = document.querySelector('#search').value.trim();
      const response = await fetch(`/api/admin/orders?q=${encodeURIComponent(q)}`, {
        headers: { authorization: `Bearer ${token()}` }
      });
      const payload = await response.json();

      if (!payload.ok) {
        ordersBody.innerHTML = `<tr><td colspan="9">${escapeHtml(payload.message || '读取失败。')}</td></tr>`;
        return;
      }

      latestOrders = payload.data || [];

      if (!latestOrders.length) {
        ordersBody.innerHTML = '<tr><td colspan="9">暂无订单。</td></tr>';
        return;
      }

      ordersBody.innerHTML = latestOrders.map((item, index) => {
        const shipped = Boolean(String(item.tracking_no || '').trim());
        return `
          <tr>
            <td>${escapeHtml(item.order_no)}</td>
            <td>${shipped ? '已发货' : '<span class="muted">待发货</span>'}</td>
            <td>${escapeHtml(item.tracking_no || '')}</td>
            <td>${escapeHtml(item.recipient_name || '')}</td>
            <td>${escapeHtml(item.recipient_phone || '')}</td>
            <td>${escapeHtml(item.recipient_address || '')}</td>
            <td>${escapeHtml(item.note || '')}</td>
            <td>${escapeHtml(item.updated_at || '')}</td>
            <td>
              <button class="secondary" type="button" onclick="fillForm(${index})">编辑</button>
              <button class="danger" type="button" onclick="deleteOrder('${encodeURIComponent(item.order_no)}')">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function deleteOrder(encodedOrderNo) {
      if (!confirm('确定删除这个订单吗？')) return;
      const response = await fetch(`/api/admin/orders?orderNo=${encodedOrderNo}`, {
        method: 'DELETE',
        headers: { authorization: `Bearer ${token()}` }
      });
      const payload = await response.json();
      showMessage(payload.ok ? 'ok' : 'bad', payload.message || '操作完成。');
      if (payload.ok) loadOrders();
    }
  </script>
</body>
</html>
