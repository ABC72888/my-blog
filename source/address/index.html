<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>填写收货地址 - 海外实体卡激活教程</title>
  <style>
    :root {
      color-scheme: light;
      --text: #172033;
      --muted: #647084;
      --line: #d9dee8;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --primary: #1677d2;
      --primary-dark: #0d5fa8;
      --ok: #15803d;
      --bad: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef5fb 0%, #f7f9fc 44%, #ffffff 100%);
    }

    header {
      border-bottom: 1px solid rgba(23, 32, 51, .08);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
    }

    .nav, main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }

    .home {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }

    main {
      padding: 38px 0 64px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(23, 32, 51, .1);
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(40, 61, 94, .08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 5vw, 36px);
      line-height: 1.16;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 650;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input { height: 46px; }
    textarea { min-height: 104px; padding-top: 12px; resize: vertical; line-height: 1.7; }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(22, 119, 210, .14);
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 6px;
      padding: 0 22px;
      color: #fff;
      background: var(--primary);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: var(--primary-dark); }
    button:disabled { opacity: .62; cursor: not-allowed; }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 6px;
      line-height: 1.7;
      background: var(--soft);
    }

    .message.show { display: block; }
    .message.ok { color: var(--ok); background: #f0fdf4; }
    .message.bad { color: var(--bad); background: #fff6f5; }

    .tips {
      margin-top: 18px;
      padding: 16px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 620px) {
      main { padding-top: 26px; }
      .panel { padding: 20px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="/">海外实体卡激活教程</a>
      <a class="home" href="/query/">查询订单</a>
    </nav>
  </header>

  <main>
    <section class="panel">
      <h1>填写收货地址</h1>
      <p>请填写你在其他平台下单后获得的订单号，以及真实收货信息。</p>

      <form id="addressForm">
        <div>
          <label for="orderNo">订单号</label>
          <input id="orderNo" autocomplete="off" placeholder="链动订单号（LD开头）" maxlength="14" pattern="LD[A-Za-z0-9]{12}" required>
        </div>
        <div>
          <label for="recipientName">收件人</label>
          <input id="recipientName" autocomplete="name" placeholder="请输入收件人姓名" required>
        </div>
        <div>
          <label for="recipientPhone">手机号</label>
          <input id="recipientPhone" autocomplete="tel" placeholder="请输入收件人手机号" required>
        </div>
        <div>
          <label for="recipientAddress">收货地址</label>
          <textarea id="recipientAddress" autocomplete="street-address" placeholder="省/市/区/详细地址" required></textarea>
        </div>
        <button id="submitBtn" type="submit">提交地址</button>
      </form>

      <div id="message" class="message" aria-live="polite"></div>

      <div class="tips">
        提交后请等待发货。发货后你可以在订单查询页面输入订单号，查看对应的快递单号和申通官网物流入口。
      </div>
    </section>
  </main>

  <script>
    const form = document.querySelector('#addressForm');
    const button = document.querySelector('#submitBtn');
    const message = document.querySelector('#message');

    function showMessage(type, text) {
      message.className = `message show ${type}`;
      message.textContent = text;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const body = {
        orderNo: document.querySelector('#orderNo').value.trim(),
        recipientName: document.querySelector('#recipientName').value.trim(),
        recipientPhone: document.querySelector('#recipientPhone').value.trim(),
        recipientAddress: document.querySelector('#recipientAddress').value.trim(),
      };

      body.orderNo = body.orderNo.replace(/\s+/g, '').toUpperCase();

      if (!body.orderNo || !body.recipientName || !body.recipientPhone || !body.recipientAddress) {
        showMessage('bad', '请把订单号、收件人、手机号和收货地址填写完整。');
        return;
      }

      if (!/^LD[A-Z0-9]{12}$/.test(body.orderNo)) {
        showMessage('bad', '订单号格式不正确，必须是 LD 开头的 14 位订单号，例如 LD260724OCOUVM。');
        return;
      }

      button.disabled = true;
      button.textContent = '提交中';

      try {
        const response = await fetch('/api/address', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
        });
        const payload = await response.json();

        showMessage(payload.ok ? 'ok' : 'bad', payload.message || (payload.ok ? '提交成功。' : '提交失败。'));
        if (payload.ok) form.reset();
      } catch (error) {
        showMessage('bad', '提交失败，请稍后再试。');
      } finally {
        button.disabled = false;
        button.textContent = '提交地址';
      }
    });
  </script>
</body>
</html>
